<script>

const elStatus = document.getElementById('status');
function status(text) {
  elStatus.innerHTML = text;
}

async function bufferedNetworkRequest(updateCallback) {
  
  status('connecting to server...');
  
  console.log('fetch');
  
  const response = await fetch("https://api.github.com/user/repos?visibility=all&sort=updated&per_page=100&page=1", {
    "headers": {
      "authorization": "token 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"
    },
    "method": "GET"
  });

  let respText = '';
  
  // @@debug
  let loadedBytes = 0;

  const res = new Response(new ReadableStream({
    async start(controller) {
      const reader = response.body.getReader();
      for (;;) {
        
        const {done, value} = await reader.read();
        
        if (!done) {
          
          const string = new TextDecoder().decode(value);
          
          respText += string;
          
          
          const validData = InvalidJSONParser.parse(respText);
          
          // @@todo compare the changes in validData and only add new data to DOM
          
          // @@note validData can be null
          
          
          updateCallback(validData, value);
          
        } else {
          
          /*
          const resp = JSON.parse(respText);
  
          console.log('fetch successful. resp:', resp);
          
          status('fetch successful!');
          */
          
          break;
          
        }
        
      }
      controller.close();
    },
  }));

}

bufferedNetworkRequest((validData, rawValue) => {

  // @@debug
  
  console.group('update');
  
  loadedBytes += rawValue.byteLength;
  
  status('loaded bytes: ' + loadedBytes);
  
  // @@debug

  console.log('validData', validData);

  const validDataArrLength = validData.length;
  
  const realDataArrSlice = realData.slice(0, validDataArrLength);
  
  const realStr = JSON.stringify(realDataArrSlice),
        validStr = JSON.stringify(validData);
  
  const doesDataMatch = (realStr === validStr);
  
  console.log('doesDataMatch?', doesDataMatch);

  console.groupEnd('update');
  
});

</script>
